<!-- templates/game/table.html -->
{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/game.css' %}">
{% endblock %}

{% block content %}
<!-- Pass Django context to JavaScript -->
<script>
    window.GAME_CONFIG = {
        gameId: "{{ game_id }}",
        playerId: "{{ player_id }}",
        guestName: "{{ guest_name }}",
        isGuest: {% if is_guest %}true{% else %}false{% endif %},
        isPrivateRoom: {% if is_private_room %}true{% else %}false{% endif %},
        isPractice: {% if is_practice %}true{% else %}false{% endif %},
        wsProtocol: window.location.protocol === 'https:' ? 'wss:' : 'ws:',
        wsHost: window.location.host
    };
</script>

<div class="game-container">
    <!-- Opponents Area (Top) -->
    <div class="opponents-area">
        <div id="opponents">
            <!-- Opponents will be rendered here by board.js -->
        </div>
    </div>

    <!-- Table Center (Middle) -->
    <div class="table-center">
        <!-- Round Info -->
        <div class="round-info">
            <div id="round-number">Round 1 of 5</div>
        </div>

        <!-- Scores Panel -->
        <div class="scores-panel">
            <h3>Scores</h3>
            <div id="scores-list">
                <!-- Scores will be rendered here by board.js -->
            </div>
        </div>

        <!-- Played Cards Center -->
        <div id="played-cards">
            <!-- Played cards will be rendered here by board.js -->
        </div>
    </div>

    <!-- Player Area (Bottom) -->
    <div class="player-area">
        <!-- Player's Hand -->
        <div class="hand" id="player-hand">
            <!-- Player's cards will be rendered here by hand.js -->
        </div>

        <!-- Play Controls -->
        <div class="play-controls">
            <button id="play-btn" class="btn btn-primary btn-lg" disabled>
                Play Card
            </button>
            
            <!-- Stack Button and Gauge - NEW -->
            <div class="stack-container" id="stack-container" style="display: none;">
                <div class="stack-gauge">
                    <div class="stack-gauge-fill" id="stack-gauge-fill" style="width: 0%;"></div>
                </div>
                <button id="stack-btn" class="btn btn-warning stack-btn" disabled>
                    <span class="stack-icon">⚡</span>
                    Stack
                </button>
            </div>
            
            <!-- Stack Selection Controls - NEW (shown during stack mode) -->
            <div class="stack-selection-controls" id="stack-selection-controls" style="display: none;">
                <span class="stack-selection-text">Select cards to stack (in order)</span>
                <div class="stack-selection-buttons">
                    <button id="stack-confirm-btn" class="btn btn-success btn-sm">Confirm Stack</button>
                    <button id="stack-cancel-btn" class="btn btn-secondary btn-sm">Cancel</button>
                </div>
            </div>
            
            <!-- Game Notifications -->
            <div id="game-notifications" class="game-notifications"></div>
        </div>
    </div>

    <!-- Mobile Score Ribbon -->
    <div id="mobile-score-ribbon" class="mobile-score-ribbon">
        <div id="mobile-scores-list" class="mobile-score-ribbon-content">
            <!-- Scores will be populated dynamically -->
        </div>
    </div>
    <button id="mobile-score-toggle" class="mobile-score-toggle">🏆</button>

    <!-- Notifications Container -->
    <div class="notifications" id="notifications">
        <!-- Dynamic notifications will appear here -->
    </div>

    <div class="game-container">
    <!-- MOBILE SCORE TOGGLE BUTTON (Mobile only) -->
    <button class="mobile-score-toggle" id="mobile-score-btn" style="display: none;">
        📊
    </button>
    
    <!-- MOBILE SCORES POPUP (Mobile only) -->
    <div class="mobile-scores-popup" id="mobile-scores-popup">
        <div class="mobile-scores-content">
            <div class="mobile-scores-header">
                <h3 class="mobile-scores-title">Scores</h3>
                <button class="mobile-scores-close" id="mobile-scores-close">×</button>
            </div>
            <div class="mobile-scores-list" id="mobile-scores-list">
                <!-- Scores will be populated here -->
            </div>
        </div>
    </div>

    <!-- Mobile Score Ribbon -->
    <div id="mobile-score-ribbon" class="mobile-score-ribbon">
        <div class="mobile-score-ribbon-header">
            <span class="mobile-score-ribbon-title">Scores</span>
            <button id="mobile-score-close" class="mobile-score-close">✕</button>
        </div>
        <div id="mobile-scores-list" class="mobile-score-ribbon-content">
            <!-- Scores will be populated dynamically -->
        </div>
    </div>
    <button id="mobile-score-toggle" class="mobile-score-toggle">
        🏆
    </button>

</div>


<!-- Loading Overlay -->
<div class="loading-overlay" id="loading-overlay">
    <div class="spinner spinner-lg">
        <div class="spinner-inner"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<!-- Core utilities -->
<script src="{% static 'js/utils/dom.js' %}"></script>

<!-- WebSocket manager -->
<script src="{% static 'js/core/socket.js' %}"></script>

<!-- Game modules -->
<script src="{% static 'js/game/board.js' %}"></script>
<script src="{% static 'js/game/hand.js' %}"></script>
<script src="{% static 'js/game/stack.js' %}"></script>
<script src="{% static 'js/game/events.js' %}"></script>

<!-- Initialize game -->
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const config = window.GAME_CONFIG;
        
        // Initialize game controller
        window.gameController = new GameEventHandler(config.gameId, config.playerId);
        window.gameController.connect();
    });
</script>

<!-- Mobile score toggle functionality -->
<script>
(function() {
    // DOM Elements
    const scoreBtn = document.getElementById('mobile-score-btn');
    const scorePopup = document.getElementById('mobile-scores-popup');
    const scoreClose = document.getElementById('mobile-scores-close');
    const mobileScoresList = document.getElementById('mobile-scores-list');
    const ribbon = document.getElementById('mobile-score-ribbon');
    const ribbonToggle = document.getElementById('mobile-score-toggle');
    const ribbonClose = document.getElementById('mobile-score-close');
    
    // ========== POPUP SYSTEM (Your existing code) ==========
    if (window.innerWidth <= 767) {
        if (scoreBtn) scoreBtn.style.display = 'flex';
    }
    
    if (scoreBtn) {
        scoreBtn.addEventListener('click', () => {
            if (scorePopup) scorePopup.classList.add('show');
            updateMobileScores();
        });
    }
    
    if (scoreClose) {
        scoreClose.addEventListener('click', () => {
            if (scorePopup) scorePopup.classList.remove('show');
        });
    }
    
    if (scorePopup) {
        scorePopup.addEventListener('click', (e) => {
            if (e.target === scorePopup) {
                scorePopup.classList.remove('show');
            }
        });
    }
    
    // ========== RIBBON SYSTEM (Your new addition) ==========
    if (ribbonToggle && ribbon) {
        ribbonToggle.addEventListener('click', () => {
            ribbon.classList.toggle('open');
        });
    }
    
    if (ribbonClose && ribbon) {
        ribbonClose.addEventListener('click', () => {
            ribbon.classList.remove('open');
        });
    }
    
    if (ribbon) {
        document.addEventListener('click', (e) => {
            if (ribbon.classList.contains('open') && 
                !ribbon.contains(e.target) && 
                ribbonToggle && !ribbonToggle.contains(e.target)) {
                ribbon.classList.remove('open');
            }
        });
    }
    
    // ========== SINGLE updateMobileScores FUNCTION ==========
    window.updateMobileScores = function() {
        // Update Popup
        if (mobileScoresList) {
            const gameController = window.gameController;
            
            if (gameController && gameController.board && gameController.board.players) {
                // Use live data from game controller
                const players = gameController.board.players;
                const currentPlayerId = gameController.playerId;
                
                mobileScoresList.innerHTML = players.map(player => `
                    <div class="mobile-score-item ${player.id === currentPlayerId ? 'current-player' : ''}">
                        <div class="mobile-score-name">${escapeHtml(player.display_name || player.name)}</div>
                        <div class="mobile-score-value">${player.score || 0}</div>
                    </div>
                `).join('');
            } else {
                // Fallback: get scores from desktop scores panel
                const desktopScores = document.querySelectorAll('.scores-panel .score-item');
                if (desktopScores.length > 0) {
                    mobileScoresList.innerHTML = Array.from(desktopScores).map(item => {
                        const name = item.querySelector('.score-name')?.textContent || '';
                        const value = item.querySelector('.score-value')?.textContent || '0';
                        const isCurrent = item.classList.contains('current-player');
                        return `
                            <div class="mobile-score-item ${isCurrent ? 'current-player' : ''}">
                                <div class="mobile-score-name">${escapeHtml(name)}</div>
                                <div class="mobile-score-value">${value}</div>
                            </div>
                        `;
                    }).join('');
                }
            }
        }
        
        // Update Ribbon
        const ribbonList = document.getElementById('mobile-scores-list-ribbon');
        if (ribbonList) {
            const gameController = window.gameController;
            if (gameController && gameController.board && gameController.board.players) {
                const players = gameController.board.players;
                const currentPlayerId = gameController.playerId;
                
                ribbonList.innerHTML = players.map(player => `
                    <div class="mobile-score-item ${player.id === currentPlayerId ? 'current-player' : ''}">
                        <span class="mobile-score-name">${escapeHtml(player.display_name || player.name)}</span>
                        <span class="mobile-score-value">${player.score || 0}</span>
                    </div>
                `).join('');
            }
        }
    };
    
    // Helper function
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // Update on window resize
    window.addEventListener('resize', () => {
        if (window.innerWidth <= 767) {
            if (scoreBtn) scoreBtn.style.display = 'flex';
        } else {
            if (scoreBtn) scoreBtn.style.display = 'none';
            if (scorePopup) scorePopup.classList.remove('show');
            if (ribbon) ribbon.classList.remove('open');
        }
    });
})();
</script>
{% endblock %}
