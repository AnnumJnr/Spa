{% extends 'base.html' %}
{% load static %}

{% block title %}Login - Spa{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Login</h1>
        
        <form id="login-form" class="auth-form">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="username" class="form-label">Username</label>
                <input 
                    type="text" 
                    id="username" 
                    name="username" 
                    class="form-input" 
                    required
                    autocomplete="username"
                    placeholder="Enter your username"
                >
            </div>
            
            <div class="form-group">
                <label for="password" class="form-label">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    class="form-input" 
                    required
                    autocomplete="current-password"
                    placeholder="Enter your password"
                >
            </div>
            
            <div id="error-message" class="form-error hidden"></div>
            
            <button type="submit" class="btn btn-primary btn-block btn-lg">
                Login
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{% url 'frontend:register' %}">Sign up</a></p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_css %}
<style>
.auth-container {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: calc(100vh - 80px);
    padding: var(--space-4);
}

.auth-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-lg);
    padding: var(--space-8);
    max-width: 450px;
    width: 100%;
    box-shadow: var(--shadow-xl);
}

.auth-card h1 {
    text-align: center;
    color: var(--accent-gold);
    margin-bottom: var(--space-6);
}

.auth-form {
    margin-bottom: var(--space-6);
}

.auth-footer {
    text-align: center;
    padding-top: var(--space-4);
    border-top: 1px solid var(--bg-tertiary);
}

.auth-footer p {
    color: var(--text-secondary);
    margin: 0;
}

.auth-footer a {
    color: var(--accent-gold);
    font-weight: var(--font-semibold);
}
</style>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const errorDiv = document.getElementById('error-message');
    const submitBtn = e.target.querySelector('button[type="submit"]');
    
    // Disable button and show loading
    submitBtn.disabled = true;
    submitBtn.textContent = 'Logging in...';
    errorDiv.classList.add('hidden');
    
    try {
        const formData = new FormData(e.target);
        const response = await fetch('/api/accounts/login/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': formData.get('csrfmiddlewaretoken')
            },
            body: JSON.stringify({
                username: formData.get('username'),
                password: formData.get('password')
            })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            // Login successful - redirect to game modes
            window.location.href = "{% url 'frontend:game_modes' %}";
        } else {
            // Show error
            errorDiv.textContent = data.error || 'Login failed. Please check your credentials.';
            errorDiv.classList.remove('hidden');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Login';
        }
    } catch (error) {
        console.error('Login error:', error);
        errorDiv.textContent = 'An error occurred. Please try again.';
        errorDiv.classList.remove('hidden');
        submitBtn.disabled = false;
        submitBtn.textContent = 'Login';
    }
});
</script>
{% endblock %}
