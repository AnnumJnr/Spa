{% extends 'base.html' %}
{% load static %}

{% block title %}Game Modes - Spa{% endblock %}

{% block content %}
<div class="modes-container">
    <h1>Select Game Mode</h1>
    
    <div class="modes-grid">
        <a href="{% url 'frontend:practice' %}" class="mode-card">
            <div class="mode-icon">🤖</div>
            <h2>Practice</h2>
            <p>Play against AI bots</p>
            <span class="mode-badge">Solo</span>
        </a>
        
        <a href="{% url 'frontend:create_room' %}" class="mode-card">
            <div class="mode-icon">🔒</div>
            <h2>Private Room</h2>
            <p>Play with friends</p>
            <span class="mode-badge">Invite Only</span>
        </a>
    </div>
    
    <!-- Hidden/Disabled modes (commented out for now) -->
    <!-- 
    <a href="{% url 'frontend:quick_match' %}" class="mode-card disabled">
        <div class="mode-icon">⚡</div>
        <h2>Quick Match</h2>
        <p>Coming Soon</p>
        <span class="mode-badge">1v1</span>
    </a>
    
    <a href="{% url 'frontend:multiplayer' %}" class="mode-card disabled">
        <div class="mode-icon">👥</div>
        <h2>Multiplayer</h2>
        <p>Coming Soon</p>
        <span class="mode-badge">2-4 Players</span>
    </a>
    -->
</div>
{% endblock %}

{% block extra_css %}
<style>
.mode-icon {
    font-size: 4rem;
    margin-bottom: var(--space-4);
}

.mode-badge {
    display: inline-block;
    margin-top: var(--space-3);
    padding: var(--space-1) var(--space-3);
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    font-size: var(--text-xs);
    border-radius: var(--radius-full);
}

.mode-card:hover .mode-badge {
    background: var(--accent-gold);
    color: var(--bg-primary);
}

/* Style for disabled modes if you want to show them as "Coming Soon" */
.mode-card.disabled {
    opacity: 0.5;
    cursor: not-allowed;
    pointer-events: none;
}
</style>
{% endblock %}
